name: Generate Logo Mosaics (both)

on:
  workflow_dispatch:
  schedule:
    - cron: '0 4 * * *'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'

      - name: Run both scripts
        run: |
          php utilities/generate-logos-mosaics-with-names.php
          php utilities/generate-logos-mosaics.php

      - name: Commit changes
        run: |
          git config user.name "🤖 R2-D2"
          git config user.email "r2d2@rebel-alliance.com"
          git add -A
          git diff --staged --quiet || git commit -m "chore: regenerate all logo mosaics"
          git push
